name: Update Lotto Supabase

on:
  schedule:
    # 매주 일요일 09:00 KST (일요일 00:00 UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # 수동 실행 가능

jobs:
  update-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Insert latest lotto round to Supabase
        id: lotto
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/update-lotto-supabase.js

      - name: Telegram 성공 알림
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","text":"✅ 로또 번호 자동 삽입 성공"}'

      - name: Telegram 실패 알림
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","text":"❌ 로또 번호 자동 삽입 실패 — GitHub Actions 로그를 확인해주세요."}'
